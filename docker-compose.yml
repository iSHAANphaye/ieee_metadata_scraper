version: '3.8'

services:
  web:
    build: .
    image: paper-scraper
    container_name: paper-scraper
    ports:
      - "5001:5000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: mongo:7.0
    container_name: paper-scraper-db
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
